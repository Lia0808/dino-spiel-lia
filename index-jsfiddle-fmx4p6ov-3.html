<!DOCTYPE html>
<html>

<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Dino Game</title>

  <style>
    #score {
  text-align: center;
}

#game {
  width: 600px;
  height: 300px;
  border: 2px solid black;
  margin: auto;
  background-image: url("https://github.com/kriscfoster/chrome-dino-game/blob/master/background.jpg?raw=true");
  background-size: cover;
  overflow: hidden;
  position: relative;
}

#dino {
  height: 75px;
  width: 75px;
  top: 225px;
  position: relative;
  background-image: url("https://github.com/kriscfoster/chrome-dino-game/blob/master/dino.png?raw=true");
  background-size: cover;
}

#rock {
  width: 50px;
  height: 50px;
  position: relative;
  top: 175px;
  left: 550px;
  background-image: url("https://github.com/kriscfoster/chrome-dino-game/blob/master/rock.png?raw=true");
  background-size: cover;
}

.rock-animation {
  animation: rock 1.33s infinite linear;
}

@keyframes rock {
  0% { left: 550px; }
  100% { left: -50px; }
}

.jump-animation {
  animation: jump 0.5s;
}

@keyframes jump {
  0% { top: 225px; }
  50% { top: 75px; }
  75% { top: 75px; }
  100% { top: 225px; }
}

button {
  display: block;
  margin: 20px auto;
  padding: 10px 20px;
  font-size: 18px;
}

#explosion {
  width: 120px;
  height: 120px;
  position: absolute;
  top: 200px;
  left: 0;
  background-image: url("https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExaTQ3Nng3c2M2N3BuN29rcG1xOTQwd2lhaTVrNjdraXNpOXF2OWJkeiZlcD12MV9naWZzX3NlYXJjaCZjdD1n/YNTpJJToueN0fPsq7c/giphy.gif");
  background-size: contain;
  background-repeat: no-repeat;
  background-position: center;
  display: none;
}

.explosion-animation {
  animation: explode 0.25s forwards;
}

@keyframes explode {
  0% {
    transform: scale(0.5);
    opacity: 1;
  }

  100% {
    transform: scale(2);
    opacity: 0;
  }
}
  </style>

  
</head>
<body>
  <h1>Dino Game</h1>

<button id="startButton">Start</button>

<div id="game">
  <div id="dino"></div>
  <div id="rock"></div>
  <div id="explosion"></div>
</div>

<h2 id="score">0</h2>

  <script>
    const explosion = document.getElementById("explosion");
const dino = document.getElementById("dino");
const rock = document.getElementById("rock");
const score = document.getElementById("score");
const startButton = document.getElementById("startButton");

let gameRunning = false;
let scoreCounter;

/* Dino springen */
function jump() {

  if (!gameRunning) return;

  if (!dino.classList.contains("jump-animation")) {

    dino.classList.add("jump-animation");

    setTimeout(() => {
      dino.classList.remove("jump-animation");
    }, 500);

  }
}

/* Tastendruck zum Springen */
document.addEventListener("keypress", jump);

/* Start Button Event */
startButton.addEventListener("click", startGame);

/* Spiel starten */
function startGame() {

  console.log("Start Button wurde geklickt");

  if (gameRunning) return;

  gameRunning = true;

  rock.classList.add("rock-animation");

  scoreCounter = setInterval(() => {

    score.innerText++;

    const dinoTop = parseInt(
      window.getComputedStyle(dino).getPropertyValue("top")
    );

    const rockLeft = parseInt(
      window.getComputedStyle(rock).getPropertyValue("left")
    );

    /* Kollision */
    if (rockLeft < 50 && rockLeft > 0 && dinoTop > 150) {

      gameRunning = false;

      clearInterval(scoreCounter);

      rock.classList.remove("rock-animation");

      explosion.style.left = rockLeft + "px";
      explosion.style.display = "block";
      explosion.classList.add("explosion-animation");

      setTimeout(() => {

        alert("Game Over! Score: " + score.innerText);

      }, 1000);

    }

  }, 50);

}
  </script>
</body>
</html>
